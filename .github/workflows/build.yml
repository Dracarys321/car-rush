name: Build Car Rush

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Windows executable
        shell: pwsh
        run: ./build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: CarRush-Windows
          path: dist/CarRush.exe

  android-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            build-essential git zip unzip
      - name: Build Android APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          python -m pip install --upgrade pip buildozer "cython<3.0"
          buildozer -v android debug
      - uses: actions/upload-artifact@v4
        with:
          name: CarRush-Android
          path: bin/*.apk

  ios-ipa:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: brew install autoconf automake libtool pkg-config
      - name: Build iOS app
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          python -m pip install --upgrade pip buildozer "cython<3.0"
          buildozer ios debug
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CarRush-iOS
          path: bin/
