name: Build Car Rush

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Windows executable
        shell: pwsh
        run: ./build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: CarRush-Windows
          path: dist/CarRush.exe

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev
      - name: Build Android APK
        run: |
          python -m pip install --upgrade pip buildozer cython
          buildozer -v android debug
      - uses: actions/upload-artifact@v4
        with:
          name: CarRush-Android
          path: bin/*.apk

  ios-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build iOS app
        run: |
          python -m pip install --upgrade pip buildozer
          buildozer ios debug
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CarRush-iOS
          path: bin/
